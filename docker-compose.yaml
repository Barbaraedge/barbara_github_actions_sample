services:
  sample-barbara-app:
    container_name: sample-barbara-app
    build:
      context: .
      dockerfile: Dockerfile
    image: sample-barbara-app:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
